services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-suas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required; set it in .env}
      POSTGRES_DB: ${POSTGRES_DB:-suas}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-suas} -d ${POSTGRES_DB:-suas}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      SUAS_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-suas}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-suas}
      SUAS_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SUAS_OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      SUAS_API_KEY: ${API_KEY:-}
      SUAS_CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SUAS_LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
